name: Refresh CPI (release-day patch, keyless)

# The light, timely job: on CPI release morning (before FRED catches up) pull the BLS
# bulk flat file and patch the newest month(s) into the existing master. Guarded so it
# can only patch a deep master, never manufacture a shallow one. Keyless.
# Requires rebuild-history to have produced the master at least once first.

on:
  workflow_dispatch:
  schedule:
    # CPI prints 8:30 ET. GitHub cron is ALWAYS UTC, but 8:30 ET is 12:30 UTC in summer
    # (EDT) and 13:30 UTC in winter (EST) — so we fire repeatedly across both windows and
    # take whichever run first sees fresh data. Repeat runs are free: save_guarded skips
    # the write when the series hash is unchanged, so a no-op run commits nothing.
    # GitHub's scheduler also routinely lags 5-15 min under load, which these absorb.
    - cron: "40 12 10-15 * *"   # 12:40 UTC — 10 min after a summer (EDT) release
    - cron: "55 12 10-15 * *"   # 12:55 UTC
    - cron: "15 13 10-15 * *"   # 13:15 UTC
    - cron: "40 13 10-15 * *"   # 13:40 UTC — 10 min after a winter (EST) release
    - cron: "55 13 10-15 * *"   # 13:55 UTC
    - cron: "15 14 10-15 * *"   # 14:15 UTC — final safety net

permissions:
  contents: write

concurrency:
  group: refresh-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Release-day patch
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: python pipeline/fetch_release.py
      - name: Commit if changed
        run: |
          git config user.name  "cpi-data-bot"
          git config user.email "cpi-data-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then echo "No change."; else
            git commit -m "data: release patch ($(date -u +%F))"; git push; fi
